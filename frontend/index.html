<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ChatBOT Financiero</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <header class="main-header">
            <input type="checkbox" class="theme-checkbox" id="theme-toggle">
        </header>

        <div class="card-container">
        <div class="card-header">
            <div class="img-avatar"></div>
            <div class="text-chat">ChatBOT Financiero</div>
        </div>
        <div class="card-body">
            <div class="messages-container">
                <div class="message-box left">
                    <p>¡Hola! Soy tu asistente financiero 🤖.</p>
                    <p>Mencioname sobre qué te gustaría enterarte:</p>
                        <div class="button-options">
                            <button class="option-btn">Acciones 📈</button>
                            <button class="option-btn">Criptomonedas 🪙</button>
                            <button class="option-btn">Cuentas remuneradas 💵</button>
                            <button class="option-btn">Dólar 💸</button>
                            <button class="option-btn" data-intent='dolar_historico'>Dólar Histórico 💰</button>
                            <button class="option-btn">Índice UVA 📅</button>
                            <button class="option-btn">Inflación 📉</button>
                            <button class="option-btn">Letras 📜</button>
                            <button class="option-btn">Plazo Fijo 🏦</button>
                            <button class="option-btn">Riesgo País 📊</button>
                            <button class="option-btn" data-intent='riesgo_pais_historico'>Riesgo País Histórico 🧾</button>
                        </div>
                </div>
            </div>
            <div class="message-input">
            <form>
                <textarea placeholder="Escriba acá..." class="message-send"></textarea>
                <button type="button" class="button-voice" id="voice-command-btn">🎙️</button>
                <button type="submit" class="button-send">Enviar</button>
            </form>
            </div>
        </div>
        </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
<script src="{{ url_for('static', filename='chatbot.js') }}"></script>

    </body>
</html>
